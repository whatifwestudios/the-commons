<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Graphics Size Checker</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            line-height: 1.4;
        }
        .header {
            background: #2a2a2a;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .warning {
            background: #663d00;
            color: #ffcc00;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .good {
            background: #003d00;
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .building-item {
            background: #2a2a2a;
            margin: 5px 0;
            padding: 10px;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .size-large { background: #4d1a1a; }
        .size-medium { background: #4d4d1a; }
        .size-good { background: #1a4d1a; }
        .preview {
            width: 32px;
            height: 32px;
            margin-right: 10px;
            border: 1px solid #555;
        }
        .building-info {
            flex-grow: 1;
            margin-left: 10px;
        }
        .size-info {
            font-weight: bold;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover { background: #45a049; }
        #results {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖼️ Building Graphics Size Checker</h1>
        <p>This tool checks all your building graphics and shows which ones need optimization.</p>
        
        <button onclick="checkAllImages()">Check All Building Images</button>
        <button onclick="showOptimizationTips()">Show Optimization Tips</button>
    </div>

    <div id="results"></div>

    <script src="buildings.js"></script>
    <script>
        const results = document.getElementById('results');
        
        async function checkAllImages() {
            results.innerHTML = '<p>🔍 Checking building images...</p>';
            
            const buildings = window.buildingManager.getAllBuildings();
            const checks = [];
            let totalSize = 0;
            let largeFiles = 0;
            let mediumFiles = 0;
            let goodFiles = 0;
            
            for (const building of buildings) {
                if (building.graphics) {
                    try {
                        const sizeInfo = await window.buildingManager.checkImageSize(building.graphics.path);
                        totalSize += sizeInfo.size;
                        
                        let sizeClass = 'size-good';
                        let status = '✅ Good';
                        
                        if (sizeInfo.size > 500 * 1024) { // 500KB+
                            sizeClass = 'size-large';
                            status = '⚠️ Too Large';
                            largeFiles++;
                        } else if (sizeInfo.size > 100 * 1024) { // 100KB+
                            sizeClass = 'size-medium';
                            status = '⚡ Medium';
                            mediumFiles++;
                        } else {
                            goodFiles++;
                        }
                        
                        checks.push({
                            building,
                            sizeInfo,
                            sizeClass,
                            status
                        });
                    } catch (e) {
                        checks.push({
                            building,
                            sizeInfo: { size: 0, sizeText: 'Error', isLarge: false },
                            sizeClass: 'size-medium',
                            status: '❌ Missing'
                        });
                    }
                }
            }
            
            // Sort by size (largest first)
            checks.sort((a, b) => b.sizeInfo.size - a.sizeInfo.size);
            
            // Create summary
            const totalSizeMB = (totalSize / 1024 / 1024).toFixed(1);
            let summary = `
                <div class="header">
                    <h2>📊 Summary</h2>
                    <p><strong>Total Size:</strong> ${totalSizeMB}MB across ${checks.length} buildings</p>
                    <p><strong>Files to optimize:</strong> ${largeFiles} large, ${mediumFiles} medium, ${goodFiles} good</p>
            `;
            
            if (largeFiles > 0) {
                summary += `<div class="warning">⚠️ ${largeFiles} files are over 500KB and should be optimized!</div>`;
            }
            
            if (totalSize > 10 * 1024 * 1024) {
                summary += `<div class="warning">⚠️ Total size (${totalSizeMB}MB) is quite large. Consider optimizing for better loading times.</div>`;
            } else {
                summary += `<div class="good">✅ Total size looks reasonable for a web game.</div>`;
            }
            
            summary += '</div>';
            
            // Create detailed list
            let details = '<div id="detailed-results">';
            checks.forEach(check => {
                const { building, sizeInfo, sizeClass, status } = check;
                
                details += `
                    <div class="building-item ${sizeClass}">
                        <img class="preview" src="${building.graphics.path}" 
                             onerror="this.src='assets/buildings/default.svg'"
                             title="Preview of ${building.name}">
                        <div class="building-info">
                            <strong>${building.name}</strong> (${building.category})<br>
                            <small>${building.graphics.filename}</small>
                        </div>
                        <div class="size-info">
                            ${status}<br>
                            <span>${sizeInfo.sizeText}</span>
                        </div>
                    </div>
                `;
            });
            details += '</div>';
            
            results.innerHTML = summary + details;
        }
        
        function showOptimizationTips() {
            results.innerHTML = `
                <div class="header">
                    <h2>🛠️ Image Optimization Tips</h2>
                    
                    <h3>Target Sizes:</h3>
                    <div class="good">✅ Ideal: 5-20KB per image</div>
                    <div class="warning">⚡ Acceptable: 20-100KB per image</div>
                    <div style="background: #4d1a1a; color: #ff6666; padding: 10px; border-radius: 5px;">
                        ❌ Too Large: 500KB+ per image
                    </div>
                    
                    <h3>Quick Solutions:</h3>
                    <ol>
                        <li><strong>Resize to 64x64 pixels</strong> - Most building graphics don't need to be larger</li>
                        <li><strong>Use online tools:</strong>
                            <ul>
                                <li><a href="https://tinypng.com" target="_blank">TinyPNG.com</a> - Upload 20 files at once</li>
                                <li><a href="https://squoosh.app" target="_blank">Squoosh.app</a> - Google's advanced compressor</li>
                                <li><a href="https://compressor.io" target="_blank">Compressor.io</a> - Batch processing</li>
                            </ul>
                        </li>
                        <li><strong>Save settings in Photoshop/GIMP:</strong>
                            <ul>
                                <li>PNG-8 instead of PNG-24 (if no transparency needed)</li>
                                <li>Reduce color palette</li>
                                <li>Save for Web option</li>
                            </ul>
                        </li>
                        <li><strong>Convert to WebP</strong> (modern browsers support it, 25-50% smaller than PNG)</li>
                    </ol>
                    
                    <h3>Batch Processing:</h3>
                    <p>If you have many files, use the <code>optimize_images.py</code> script included in your project:</p>
                    <pre style="background: #000; padding: 10px; border-radius: 3px;">
# Install Pillow if you haven't: pip install Pillow
python optimize_images.py /path/to/your/images --size 64
                    </pre>
                    
                    <p><strong>Current system:</strong> The game will automatically resize large images to 64x64, 
                    but it's better to optimize them beforehand for faster loading.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
