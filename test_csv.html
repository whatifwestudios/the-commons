<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Building Test</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            white-space: pre-wrap;
            max-height: 600px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>CSV Building Loader Test</h1>
    
    <button onclick="loadCSV()">Load Buildings from Master CSV</button>
    <button onclick="clearBuildings()">Clear All Buildings</button>
    <button onclick="forceReload()">Force Reload CSV</button>
    <button onclick="showCurrentBuildings()">Show Current Buildings</button>
    
    <div id="output"></div>
    
    <script src="buildings.js"></script>
    <script>
        const output = document.getElementById('output');
        
        async function loadCSV() {
            output.textContent = 'Loading buildings from master CSV...\n';
            try {
                const result = await window.loadBuildingsFromMasterCSV();
                if (result) {
                    const categories = Object.keys(result);
                    output.textContent += `Success! Loaded ${categories.length} categories:\n\n`;
                    
                    categories.forEach(category => {
                        output.textContent += `${category.toUpperCase()}: ${result[category].length} buildings\n`;
                        result[category].forEach(building => {
                            output.textContent += `  - ${building.name} (Cost: $${building.economics.buildCost})\n`;
                        });
                        output.textContent += '\n';
                    });
                } else {
                    output.textContent += 'Failed to load buildings.\n';
                }
            } catch (error) {
                output.textContent += `Error: ${error.message}\n`;
            }
        }
        
        function clearBuildings() {
            window.buildingManager.clearAllBuildings();
            output.textContent = 'All buildings cleared.\n';
        }
        
        async function forceReload() {
            output.textContent = 'Force reloading CSV...\n';
            const result = await window.forceReloadCSV();
            if (result) {
                const totalBuildings = Object.values(result).reduce((sum, cat) => sum + cat.length, 0);
                output.textContent += `Force reload complete: ${totalBuildings} buildings loaded.\n`;
            } else {
                output.textContent += 'Force reload failed.\n';
            }
        }
        
        function showCurrentBuildings() {
            const buildings = window.buildingManager.buildings;
            const categories = Object.keys(buildings);
            
            if (categories.length === 0 || categories.every(cat => !buildings[cat] || buildings[cat].length === 0)) {
                output.textContent = 'No buildings currently loaded.\n';
                return;
            }
            
            output.textContent = 'Current buildings:\n\n';
            categories.forEach(category => {
                if (buildings[category] && buildings[category].length > 0) {
                    output.textContent += `${category.toUpperCase()}: ${buildings[category].length} buildings\n`;
                    buildings[category].forEach(building => {
                        output.textContent += `  - ${building.name} (ID: ${building.id})\n`;
                    });
                    output.textContent += '\n';
                }
            });
        }
        
        // Check initial state
        showCurrentBuildings();
    </script>
</body>
</html>
