<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Town Hall - formal government building -->
  <defs>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DDD8C7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main building -->
  <rect x="12" y="26" width="40" height="28" fill="url(#wallGrad)" stroke="#D2B48C" stroke-width="1"/>
  
  <!-- Roof -->
  <polygon points="32,16 10,26 54,26" fill="url(#roofGrad)" stroke="#654321" stroke-width="1"/>
  
  <!-- Front columns -->
  <rect x="18" y="30" width="3" height="24" fill="#F5F5DC" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="26" y="30" width="3" height="24" fill="#F5F5DC" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="34" y="30" width="3" height="24" fill="#F5F5DC" stroke="#E5E5E5" stroke-width="1"/>
  <rect x="42" y="30" width="3" height="24" fill="#F5F5DC" stroke="#E5E5E5" stroke-width="1"/>
  
  <!-- Column caps -->
  <rect x="17" y="28" width="5" height="3" fill="#F5F5DC"/>
  <rect x="25" y="28" width="5" height="3" fill="#F5F5DC"/>
  <rect x="33" y="28" width="5" height="3" fill="#F5F5DC"/>
  <rect x="41" y="28" width="5" height="3" fill="#F5F5DC"/>
  
  <!-- Grand entrance -->
  <rect x="28" y="42" width="8" height="12" fill="#4A4A4A" stroke="#2F2F2F" stroke-width="1"/>
  
  <!-- Windows -->
  <rect x="16" y="34" width="4" height="6" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  <rect x="44" y="34" width="4" height="6" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  
  <!-- Flag pole -->
  <line x1="32" y1="16" x2="32" y2="8" stroke="#8B7355" stroke-width="2"/>
  <polygon points="32,8 42,10 32,12" fill="#FF6B6B"/>
  
  <!-- Steps -->
  <rect x="20" y="52" width="24" height="2" fill="#D2B48C"/>
  <rect x="22" y="50" width="20" height="2" fill="#DDD8C7"/>
  
  <!-- Clock tower -->
  <rect x="30" y="16" width="4" height="10" fill="url(#wallGrad)" stroke="#D2B48C" stroke-width="1"/>
  <circle cx="32" cy="20" r="2" fill="#F5F5DC" stroke="#D2B48C" stroke-width="1"/>
  <line x1="32" y1="20" x2="32" y2="18" stroke="#4A4A4A" stroke-width="1"/>
  <line x1="32" y1="20" x2="33" y2="20" stroke="#4A4A4A" stroke-width="1"/>
</svg>