<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Herbalist Hut - natural healing building -->
  
  <!-- Thatched roof -->
  <ellipse cx="32" cy="24" rx="20" ry="8" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <ellipse cx="32" cy="22" rx="18" ry="6" fill="#F0E68C" stroke="#DAA520" stroke-width="1"/>
  
  <!-- Rounded hut walls -->
  <ellipse cx="32" cy="42" rx="16" ry="12" fill="#8FBC8F" stroke="#6B8E23" stroke-width="1"/>
  
  <!-- Door -->
  <ellipse cx="32" cy="50" rx="4" ry="6" fill="#654321" stroke="#4A4A4A" stroke-width="1"/>
  
  <!-- Hanging herbs -->
  <circle cx="24" cy="36" r="2" fill="#228B22"/>
  <circle cx="40" cy="38" r="2" fill="#32CD32"/>
  <circle cx="28" cy="32" r="1.5" fill="#9ACD32"/>
  <circle cx="36" cy="34" r="1.5" fill="#6B8E23"/>
  <line x1="24" y1="32" x2="24" y2="34" stroke="#8B4513" stroke-width="1"/>
  <line x1="40" y1="34" x2="40" y2="36" stroke="#8B4513" stroke-width="1"/>
  <line x1="28" y1="28" x2="28" y2="30" stroke="#8B4513" stroke-width="1"/>
  <line x1="36" y1="30" x2="36" y2="32" stroke="#8B4513" stroke-width="1"/>
  
  <!-- Garden plots around the hut -->
  <rect x="18" y="52" width="6" height="4" fill="#8FBC8F" rx="1"/>
  <rect x="40" y="54" width="6" height="4" fill="#8FBC8F" rx="1"/>
  
  <!-- Small plants -->
  <circle cx="20" cy="54" r="1" fill="#228B22"/>
  <circle cx="22" cy="54" r="1" fill="#32CD32"/>
  <circle cx="42" cy="56" r="1" fill="#228B22"/>
  <circle cx="44" cy="56" r="1" fill="#9ACD32"/>
  
  <!-- Mortar and pestle (small) -->
  <ellipse cx="38" cy="44" rx="2" ry="1" fill="#696969"/>
  <circle cx="38" cy="44" r="0.5" fill="#8B4513"/>
  
  <!-- Smoke from chimney -->
  <circle cx="26" cy="20" r="1" fill="#D3D3D3" opacity="0.7"/>
  <circle cx="24" cy="16" r="1.5" fill="#D3D3D3" opacity="0.5"/>
  <circle cx="22" cy="12" r="2" fill="#D3D3D3" opacity="0.3"/>
  
  <!-- Window -->
  <circle cx="40" cy="42" r="3" fill="#FFE4B5" stroke="#DAA520" stroke-width="1"/>
  <line x1="40" y1="39" x2="40" y2="45" stroke="#8B4513" stroke-width="0.5"/>
  <line x1="37" y1="42" x2="43" y2="42" stroke="#8B4513" stroke-width="0.5"/>
</svg>