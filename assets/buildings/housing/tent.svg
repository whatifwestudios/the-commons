<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple tent -->
  <defs>
    <linearGradient id="tentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tent body -->
  <polygon points="32,20 16,48 48,48" fill="url(#tentGrad)" stroke="#333" stroke-width="1"/>
  
  <!-- Tent pole -->
  <line x1="32" y1="20" x2="32" y2="48" stroke="#2F4F4F" stroke-width="2"/>
  
  <!-- Tent flap -->
  <polygon points="32,48 28,40 36,40" fill="#654321" stroke="#333" stroke-width="1"/>
  
  <!-- Rope stakes -->
  <circle cx="16" cy="48" r="2" fill="#333"/>
  <circle cx="48" cy="48" r="2" fill="#333"/>
  <line x1="16" y1="48" x2="20" y2="44" stroke="#666" stroke-width="1"/>
  <line x1="48" y1="48" x2="44" y2="44" stroke="#666" stroke-width="1"/>
</svg>